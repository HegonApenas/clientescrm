name: Deploy Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login no ACR
        uses: docker/login-action@v2
        with:
          registry: pythoncloud.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build e Push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: pythoncloud.azurecr.io/minha-app:v1